name: Build release
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Prep
        id: prep
        run: |
          GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/iracelog-web
          VERSION=edge
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ $GITHUB_REF == refs/heads/* ]]; then
            VERSION=$(echo ${GITHUB_REF#refs/heads/} | sed -r 's#/+#-#g')
          elif [[ $GITHUB_REF == refs/pull/* ]]; then
            VERSION=pr-${{ github.event.number }}
          fi
          TAGS="${GHCR_IMAGE}:${VERSION}"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAGS="$TAGS,${GHCR_IMAGE}:sha-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - name: Prep npm for using packages from buf.build
        run: |
          pnpm config set @buf:registry  https://buf.build/gen/npm/v1/

      - name: Install dependencies
        run: pnpm install
      - name: Test
        run: pnpm test:no-watch --passWithNoTests
        env:
          CI: true
          RUN_SLOW_TESTS: true
      - name: Build
        run: pnpm build
        env:
          CI: false
      - name: Copy to docker
        run: cp -r dist/ docker/dist

      - name: setup qemu for docker
        uses: docker/setup-qemu-action@v4
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4
      - name: Download syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Prepare cosign installer
        uses: sigstore/cosign-installer@v4.1.1

      - name: Login to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: release-drafter/release-drafter@v7
        id: rd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: prepare changlog
        run: |
          echo "${{ steps.rd.outputs.body }}" > "${{ runner.temp }}/CHANGELOG.md"

      - name: Release via goreleaser
        uses: goreleaser/goreleaser-action@v7
        # On 2026-03-14 we got error on dirty git state for modified pnpm-lock.yaml
        # For now we skip the validation step and investigate later how to fix the underlying issue
        with:          
          args: release --clean --release-notes="${{ runner.temp }}/CHANGELOG.md" --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.ref_type == 'tag'
        # Note: The standard setting for the repository doesn't allow the default GITHUB_TOKEN to be used here
        # Either define a seperate Personal Access Token or permit the default GITHUB_TOKEN read/write access
        # see section "Workflow permissions" on https://github.com/mpapenbr/iracelog/settings/actions
        
      
